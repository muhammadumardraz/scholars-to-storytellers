name: S2S Pipeline

on:
  workflow_dispatch:
    inputs:
      department:
        description: 'Single department (leave blank for all)'
        required: false
        default: ''
  schedule:
    - cron: '0 2 * * 0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Each department runs independently - one timeout never kills the others
# Each job runs up to 6 batches of Phase 4 with artifact saves in between,
# so even a timeout only loses the last batch (not hours of work).
jobs:

  anthropology:
    name: Anthropology
    runs-on: windows-latest
    timeout-minutes: 355
    if: ${{ github.event.inputs.department == '' || github.event.inputs.department == 'Anthropology' }}
    steps:
      - uses: actions/checkout@v4

      - name: Batch 1 (Phases 1-3 + start Phase 4)
        shell: pwsh
        timeout-minutes: 90
        continue-on-error: true
        env:
          EMAIL_FOR_API: ${{ secrets.EMAIL_FOR_API }}
        run: .\run_dept.ps1 -Department Anthropology -WorkDir "$env:GITHUB_WORKSPACE" -EmailForAPI "$env:EMAIL_FOR_API" -MinCitationsWorks 50

      - name: Save progress after batch 1
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-Anthropology
          path: "*.csv"
          if-no-files-found: ignore
          overwrite: true
          retention-days: 90

      - name: Batch 2
        shell: pwsh
        timeout-minutes: 50
        continue-on-error: true
        env:
          EMAIL_FOR_API: ${{ secrets.EMAIL_FOR_API }}
        run: .\run_dept.ps1 -Department Anthropology -WorkDir "$env:GITHUB_WORKSPACE" -EmailForAPI "$env:EMAIL_FOR_API" -MinCitationsWorks 50

      - name: Save progress after batch 2
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-Anthropology
          path: "*.csv"
          if-no-files-found: ignore
          overwrite: true
          retention-days: 90

      - name: Batch 3
        shell: pwsh
        timeout-minutes: 50
        continue-on-error: true
        env:
          EMAIL_FOR_API: ${{ secrets.EMAIL_FOR_API }}
        run: .\run_dept.ps1 -Department Anthropology -WorkDir "$env:GITHUB_WORKSPACE" -EmailForAPI "$env:EMAIL_FOR_API" -MinCitationsWorks 50

      - name: Save progress after batch 3
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-Anthropology
          path: "*.csv"
          if-no-files-found: ignore
          overwrite: true
          retention-days: 90

      - name: Batch 4
        shell: pwsh
        timeout-minutes: 50
        continue-on-error: true
        env:
          EMAIL_FOR_API: ${{ secrets.EMAIL_FOR_API }}
        run: .\run_dept.ps1 -Department Anthropology -WorkDir "$env:GITHUB_WORKSPACE" -EmailForAPI "$env:EMAIL_FOR_API" -MinCitationsWorks 50

      - name: Save progress after batch 4
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-Anthropology
          path: "*.csv"
          if-no-files-found: ignore
          overwrite: true
          retention-days: 90

      - name: Batch 5
        shell: pwsh
        timeout-minutes: 50
        continue-on-error: true
        env:
          EMAIL_FOR_API: ${{ secrets.EMAIL_FOR_API }}
        run: .\run_dept.ps1 -Department Anthropology -WorkDir "$env:GITHUB_WORKSPACE" -EmailForAPI "$env:EMAIL_FOR_API" -MinCitationsWorks 50

      - name: Save progress after batch 5
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-Anthropology
          path: "*.csv"
          if-no-files-found: ignore
          overwrite: true
          retention-days: 90

      - name: Batch 6
