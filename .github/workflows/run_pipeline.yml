name: S2S Pipeline

on:
  workflow_dispatch:
    inputs:
      department:
        description: 'Single department (leave blank for all)'
        required: false
        default: ''
  schedule:
    - cron: '0 2 * * 0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Each department runs independently - one timeout never kills the others
jobs:

  anthropology:
    name: Anthropology
    runs-on: windows-latest
    timeout-minutes: 360
    if: ${{ github.event.inputs.department == '' || github.event.inputs.department == 'Anthropology' }}
    steps:
      - uses: actions/checkout@v4
      - name: Run
        shell: pwsh
        env:
          EMAIL_FOR_API: ${{ secrets.EMAIL_FOR_API }}
        run: .\run_dept.ps1 -Department Anthropology -WorkDir "$env:GITHUB_WORKSPACE" -EmailForAPI "$env:EMAIL_FOR_API" -MinCitationsWorks 50
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-Anthropology
          path: "*.csv"
          if-no-files-found: ignore
          retention-days: 90

  history:
    name: History
    runs-on: windows-latest
    timeout-minutes: 360
    if: ${{ github.event.inputs.department == '' || github.event.inputs.department == 'History' }}
    steps:
