name: S2S Pipeline

on:
  workflow_dispatch:
    inputs:
      department:
        description: 'Single department (leave blank for all)'
        required: false
        default: ''
  schedule:
    - cron: '0 2 * * 0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Each department runs independently.
# Each job restores its previous artifact at startup (so it resumes across runs),
# then runs up to 6 batches of Phase 4 with saves in between.
# The continue_pipeline.yml auto-restarts this workflow if any job timed out.
jobs:

  anthropology:
    name: Anthropology
    runs-on: windows-latest
    timeout-minutes: 355
    if: ${{ github.event.inputs.department == '' || github.event.inputs.department == 'Anthropology' }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore previous progress
        continue-on-error: true
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = "application/vnd.github+json" }
          $resp = Invoke-RestMethod "https://api.github.com/repos/$env:GITHUB_REPOSITORY/actions/artifacts?name=results-Anthropology&per_page=5" -Headers $headers -ErrorAction SilentlyContinue
          if ($resp -and $resp.artifacts -and $resp.artifacts.Count -gt 0) {
              $url = ($resp.artifacts | Where-Object { -not $_.expired } | Select-Object -First 1).archive_download_url
              if ($url) {
                  Invoke-WebRequest $url -Headers $headers -OutFile "prev.zip" -ErrorAction SilentlyContinue
                  if (Test-Path "prev.zip") {
                      Expand-Archive "prev.zip" -DestinationPath . -Force
                      Remove-Item "prev.zip" -Force
                      $p3 = Get-ChildItem "SOP_P3_*.csv" -ErrorAction SilentlyContinue | Select-Object -First 1
                      $we = if (Test-Path "SOP_With_Emails.csv") { (Import-Csv "SOP_With_Emails.csv").Count } else { 0 }
                      if ($p3) { Write-Host "Restored previous progress. Emails so far: $we" -ForegroundColor Green }
                  }
              }
          } else { Write-Host "No previous artifact - starting fresh." -ForegroundColor Yellow }

      - name: Batch 1 (Phases 1-3 + start Phase 4)
        shell: pwsh
        timeout-minutes: 90
        continue-on-error: true
        env:
          EMAIL_FOR_API: ${{ secrets.EMAIL_FOR_API }}
        run: .\run_dept.ps1 -Department Anthropology -WorkDir "$env:GITHUB_WORKSPACE" -EmailForAPI "$env:EMAIL_FOR_API" -MinCitationsWorks 50

      - name: Save progress after batch 1
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-Anthropology
          path: "*.csv"
          if-no-files-found: ignore
          overwrite: true
          retention-days: 90

      - name: Batch 2
        shell: pwsh
        timeout-minutes: 50
        continue-on-error: true
        env:
          EMAIL_FOR_API: ${{ secrets.EMAIL_FOR_API }}
        run: .\run_dept.ps1 -Department Anthropology -WorkDir "$env:GITHUB_WORKSPACE" -EmailForAPI "$env:EMAIL_FOR_API" -MinCitationsWorks 50

      - name: Save progress after batch 2
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-Anthropology
          path: "*.csv"
          if-no-files-found: ignore
          overwrite: true
          retention-days: 90

      - name: Batch 3
        shell: pwsh
        timeout-minutes: 50
        continue-on-error: true
        env:
          EMAIL_FOR_API: ${{ secrets.EMAIL_FOR_API }}
        run: .\run_dept.ps1 -Department Anthropology -WorkDir "$env:GITHUB_WORKSPACE" -EmailForAPI "$env:EMAIL_FOR_API" -MinCitationsWorks 50

      - name: Save progress after batch 3
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-Anthropology
          path: "*.csv"
          if-no-files-found: ignore
          overwrite: true
          retention-days: 90

      - name: Batch 4
        shell: pwsh
        timeout-minutes: 50
        continue-on-error: true
        env:
          EMAIL_FOR_API: ${{ secrets.EMAIL_FOR_API }}
        run: .\run_dept.ps1 -Department Anthropology -WorkDir "$env:GITHUB_WORKSPACE" -EmailForAPI "$env:EMAIL_FOR_API" -MinCitationsWorks 50

      - name: Save progress after batch 4
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-Anthropology
          path: "*.csv"
          if-no-files-found: ignore
          overwrite: true
          retention-days: 90

      - name: Batch 5
        shell: pwsh
        timeout-minutes: 50
        continue-on-error: true
        env:
          EMAIL_FOR_API: ${{ secrets.EMAIL_FOR_API }}
        run: .\run_dept.ps1 -Department Anthropology -WorkDir "$env:GITHUB_WORKSPACE" -EmailForAPI "$env:EMAIL_FOR_API" -MinCitationsWorks 50

      - name: Save progress after batch 5
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-Anthropology
          path: "*.csv"
          if-no-files-found: ignore
          overwrite: true
          retention-days: 90

      - name: Batch 6
        shell: pwsh
        timeout-minutes: 45
        continue-on-error: true
        env:
          EMAIL_FOR_API: ${{ secrets.EMAIL_FOR_API }}
        run: .\run_dept.ps1 -Department Anthropology -WorkDir "$env:GITHUB_WORKSPACE" -EmailForAPI "$env:EMAIL_FOR_API" -MinCitationsWorks 50

      - name: Final save
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-Anthropology
          path: "*.csv"
          if-no-files-found: ignore
          overwrite: true
